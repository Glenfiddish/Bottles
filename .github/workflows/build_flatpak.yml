on:
  push:
    branches: [main]
  pull_request:
name: Build Flatpak
jobs:
  flatpak:
    name: "build-packages"
    runs-on: ubuntu-latest
    container:
      image: bilelmoussaoui/flatpak-github-actions:gnome-47
      options: --privileged
    steps:
    - uses: actions/checkout@v4
    - uses: bilelmoussaoui/flatpak-github-actions/flatpak-builder@v6
      with:
        bundle: bottles.flatpak
        manifest-path: build-aux/com.usebottles.bottles.Devel.json
        cache-key: flatpak-builder-${{ github.sha }}
    - name: "Extract All-in-One Offline Bundle"
      run: |
        # 兼容处理容器内 flatpak 仓库的可能驻留路径
        REPO_PATH="/root/.local/share/flatpak/repo"
        if [ ! -d "$REPO_PATH" ]; then REPO_PATH="/var/lib/flatpak/repo"; fi
        
        REAL_ID=$(echo "$TARGET_REF" | cut -d'/' -f2)
        REAL_BRANCH=$(echo "$TARGET_REF" | cut -d'/' -f4)

        echo "ℹ️ 探测到真实的 App ID 为: $REAL_ID"
        echo "ℹ️ 探测到真实的分支为: $REAL_BRANCH"
        echo "正在使用本地仓库: $REPO_PATH 导出应用单文件包..."

        # 4. 使用正确的变量进行打包
        flatpak build-bundle \
          "$REPO_PATH" \
          bottles-all-in-one.flatpak \
          "$REAL_ID" \
          "$REAL_BRANCH"

    - name: "Upload Offline Package to Artifacts"
      uses: actions/upload-artifact@v4
      with:
        name: Bottles-Gnome47-Offline
        path: bottles-all-in-one.flatpak
